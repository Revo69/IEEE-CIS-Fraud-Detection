name: "fraud_dbt"
version: "1.0.0"

profile: "fraud_dbt"

# Где искать модели, тесты, seeds
model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  fraud_dbt:
    # staging слой — views (быстро, не занимают место)
    staging:
      +materialized: view
      +schema: fraud_detection

    # marts слой — tables (медленнее но можно индексировать)
    marts:
      +materialized: table
      +schema: fraud_detection