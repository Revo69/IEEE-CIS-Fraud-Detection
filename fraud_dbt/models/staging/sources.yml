version: 2

sources:
  - name: fraud_detection
    description: "IEEE-CIS Fraud Detection data in BigQuery"
    database: notional-life-489018-q1
    schema: fraud_detection

    tables:
      - name: staging_fraud
        description: "Transformed data after ETL pipeline (590k transactions)"

        columns:
          - name: TransactionID
            description: "Unique transaction ID"
            tests:
              - unique
              - not_null

          - name: isFraud
            description: "Target variable: 1=fraud, 0=legitimate"
            tests:
              - not_null
              - accepted_values:
                  arguments:
                    values: [0, 1]
                    quote: false

          - name: TransactionAmt
            description: "Transaction amount in USD"
            tests:
              - not_null

          - name: tx_hour
            description: "Transaction hour (0-23)"
            tests:
              - not_null

          - name: has_identity
            description: "Flag: whether identity record exists"
            tests:
              - accepted_values:
                  arguments:
                    values: [0, 1]
                    quote: false