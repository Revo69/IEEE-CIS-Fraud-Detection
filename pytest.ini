[pytest]
# Где искать тесты
testpaths = tests

# Какие файлы считать тестами
python_files = test_*.py

# Какие классы считать тестовыми
python_classes = Test*

# Какие функции считать тестами
python_functions = test_*

# Дополнительные опции по умолчанию:
# -v          = подробный вывод (имя каждого теста)
# --tb=short  = короткий traceback при ошибках
addopts = -v --tb=short

# Минимальная версия pytest
minversion = 8.0